version: "3.9"

services:
  vector:
    image: timberio/vector:0.34.0-debian
    container_name: vector
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./vector.toml:/etc/vector/vector.toml:ro
      - /var/log/nginx:/var/log/nginx:ro
    command: ["--config", "/etc/vector/vector.toml"]